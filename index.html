<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Travel Block</title>

        <link rel="stylesheet" href="./styles/variables.css" />
        <link rel="stylesheet" href="./styles/standard.css" />
        <link rel="stylesheet" href="./styles/font" />
        <link rel="stylesheet" href="./styles/landingpage.css" />
        <link rel="stylesheet" href="./styles/responsive.css" />

        <link rel="icon" type="image/x-icon" href="./assets/png/favicon.svg" />
    </head>

    <body>
        <header>
            <img src="./assets/png/favicon.svg" alt="travel blog logo" />
        </header>

        <main>
            <section class="hero">
                <div class="yellow_swirl">
                    <div class="headline_hero">
                        <h1>Cappadocia</h1>
                        <p>
                            From sunrise ballons to hidden cave dwellings, every
                            moment feels unreal in the best way.
                        </p>
                    </div>
                    <img src="./assets/png/Circle.svg" alt="Turkey_logo" />
                </div>
            </section>
        </main>
        <footer>
            <section class="copywrite_Section">
                <p>Imprint</p>
                <p>Cookie Preferences</p>
                <span class="copywrite_logo">
                    <img
                        src="./assets/icon/copyright.svg"
                        alt="copywrite image"
                    />
                    <p>Travel Blog 2026</p>
                </span>
            </section>

            <section class="social_media_logo">
                <a target="_blank" href="https://www.tiktok.com/"
                    ><img
                        src="./assets/icon/social_media/tiktok.svg"
                        alt="ticktok icon"
                /></a>
                <a target="_blank" href="https://www.youtube.com/">
                    <img
                        class="youtubeimg"
                        src="./assets/icon/social_media/youtube.svg"
                        alt="youtube icon"
                /></a>
                <a target="_blank" href="https://www.facebook.com/"
                    ><img
                        src="./assets/icon/social_media/facebook.svg"
                        alt="facebook icon"
                /></a>
                <a target="_blank" href="https://www.instagram.com/">
                    <img
                        src="./assets/icon/social_media/Instagram.svg"
                        alt="Instagram icon"
                /></a>
            </section>
        </footer>

</html>
